{% layout 'plain.html' %}

{% block content %}
<article class="prose p-3 bg-white rounded-md shadow-md shadow-peach-500/50">
  <h1 class="font-bold tracking-wide text-mint-800">{{ title }}</h1>
  <h2 class="font-sans text-mint-700">{{ metadata }}</h2>
  {% if blurb %}
    <span class="text-ellipsis">
      {{ blurb }}
    </span>
  {% endif %}
  <figure>
    <img src="{{ image.url }}" alt="{{ image.alt }}">
    {% if description %}
      <figcaption>{{ description }}</figcaption>
    {% else %}
      <figcaption>{{ image.alt }}</figcaption>
    {% endif %}
  </figure>
</article>
{% endblock %}
